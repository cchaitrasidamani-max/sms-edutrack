version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sms_db
      MYSQL_USER: smsuser
      MYSQL_PASSWORD: smspassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: sms-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: smsuser
      SPRING_DATASOURCE_PASSWORD: smspassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: sms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
