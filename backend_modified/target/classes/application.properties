# Application
spring.application.name=student-management-system
server.port=8082

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
# For production (MySQL), uncomment and configure:
spring.datasource.url=jdbc:mysql://localhost:3306/sms_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect



# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Data initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==========================================
# JWT CONFIGURATION
# ==========================================
app.jwt.secret=SMS_SECRET_KEY_COLLEGE_MANAGEMENT_SYSTEM_2024_SUPER_SECURE_256_BITS
app.jwt.expiration=86400000

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ==========================================
# LOGGING
# ==========================================
logging.level.com.sms=INFO
logging.level.org.springframework.security=WARN
